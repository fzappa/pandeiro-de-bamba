services:
  pandeiro:
    build:
      context: .
    image: pandeiro-de-bamba:latest
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    init: true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped
